experiment_name: lorenz_single_linspace_ab
seed: 7
paths:
  output_root: outputs_abfull
run:
  mode: quick
system:
  type: lorenz_single
  sigma: 10.0
  beta: 2.6666666666666665
  observed_indices:
  - 0
  - 1
  - 2
data:
  dt: 0.01
  transient_time: 25.0
  trajectory_time: 120.0
  train_param_min: 25.0
  train_param_max: 35.0
  num_param_samples: 80
  param_sampling_strategy: linspace
vae:
  batch_size: 100
  lr: 0.002
  beta_vae: 0.001
  param_size: 5
  hidden_channels: 32
  prop_layers: 1
  input_length: 300
  validation_length: 20
  validation_random_length: 280
  max_epochs: 6000
  eps: 1.0e-08
  param_dropout_prob: 0.1
  correlation_length: 31
  decoder_dt: 1.0e-06
  prop_noise: 0.0
  discount_rate: 0.0
reservoir:
  nr: 800
  d: 550
  lambda: 1.34
  kin: 0.04
  kb: 3.0
  b0: 3.5
  alpha: 0.7
  ridge_reg: 1.0e-06
  washout: 30
  warmup: 80
  train_length: 500
  predict_steps: 400
eval:
  batch_size: 128
detector:
  std_threshold: 0.2
  amplitude_threshold: 0.8
  tail_fraction: 0.4
  tail_std_threshold: 0.05
  tail_amplitude_threshold: 0.2
  tail_energy_threshold: 0.05
  tail_std_ratio_threshold: 0.35
  tail_amplitude_ratio_threshold: 0.35
  tail_windows: 3
  tail_window_std_threshold: 0.05
  tail_window_amplitude_threshold: 0.2
evaluation:
  param_name: rho
  critical_truth: 23.99
  base_param_strategy: target_value
  base_param_value: 30.0
  paper_reference_mapping:
    coef: 4.3
    intercept: 28.5
  use_paper_reference_mapping: true
  physical_critical_direction: decrease
  auto_infer_scan_direction: true
  require_healthy_base: true
  num_realizations: 30
  scan_direction: -1.0
  scan_step: 0.02
  coarse_steps: 80
  binary_steps: 16
  coarse_unhealthy_streak: 1
figures:
  prefix: fig_lorenz_single
quick_demo:
  data:
    num_param_samples: 12
    trajectory_time: 35.0
  vae:
    batch_size: 12
    max_epochs: 8
    validation_random_length: 80
    input_length: 300
    validation_length: 10
  reservoir:
    nr: 120
    d: 20
    washout: 10
    warmup: 15
    train_length: 80
    predict_steps: 80
  evaluation:
    num_realizations: 8
    coarse_steps: 30
full_reproduction: {}
